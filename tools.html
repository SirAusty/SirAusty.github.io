<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebel FX — Utility Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f17; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px rgba(255, 255, 255, 0.08) solid; }
    </style>
</head>
<body class="text-slate-300">

    <nav class="glass border-b border-white/5 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-white">Rebel<span class="text-emerald-400">FX</span></a>
            <a href="index.html" class="text-sm text-emerald-400">Back Home</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-10">
        <h1 class="text-3xl font-bold text-white mb-8">Rebel FX Utility Portal</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-2xl">
                <h3 class="text-xl font-bold text-white mb-2">Rebels FX Blueprint</h3>
                <p class="text-sm text-slate-400 mb-4">Your personal trading journal bot.</p>
                <a href="https://t.me/projectrebel_bot" target="_blank" class="block bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-lg text-center transition-all">Launch Bot</a>
            </div>
            
            <div class="glass p-6 rounded-2xl">
                <h3 class="text-xl font-bold text-white mb-2">Sentinel Bot</h3>
                <p class="text-sm text-slate-400 mb-4">Trade data processing and analysis.</p>
                <a href="https://t.me/projectrebel_bot" target="_blank" class="block bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-lg text-center transition-all">Launch Bot</a>
                <div class="glass p-6 rounded-2xl mt-8">
    <h2 class="text-white font-bold text-xl mb-4">Trade Planner & R:R</h2>
    <div class="space-y-4">
        <div>
            <label class="text-xs text-slate-400">Select Asset</label>
            <select id="assetSelect" class="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white">
                <option value="1">Volatility 75</option>
                <option value="1">Volatility 75 (1s)</option>
                <option value="1">Step Index</option>
                <option value="1">Boom 1000 / Crash 1000</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-xs text-slate-400">Balance ($)</label>
                <input id="balance" type="number" class="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white" placeholder="100">
            </div>
            <div>
                <label class="text-xs text-slate-400">Risk (%)</label>
                <input id="risk" type="number" class="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white" placeholder="1">
            </div>
        </div>
        <div>
            <label class="text-xs text-slate-400">Stop Loss in Points</label>
            <input id="stoploss" type="number" class="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white" placeholder="100">
        </div>
        
        <div class="pt-4 border-t border-white/10 space-y-2">
            <p class="text-sm text-slate-300">Max Loss: <span id="riskAmount" class="text-rose-400 font-bold">$0.00</span></p>
            <p class="text-sm text-slate-300">Lot Size: <span id="lotSize" class="text-emerald-400 font-bold">0.000</span></p>
            <div class="grid grid-cols-2 gap-2 pt-2">
                <div class="bg-emerald-900/20 p-2 rounded border border-emerald-500/20 text-center">
                    <p class="text-[10px] text-emerald-400 uppercase">TP (1:2)</p>
                    <p id="tp1" class="text-white font-bold">$0.00</p>
                </div>
                <div class="bg-emerald-900/20 p-2 rounded border border-emerald-500/20 text-center">
                    <p class="text-[10px] text-emerald-400 uppercase">TP (1:3)</p>
                    <p id="tp2" class="text-white font-bold">$0.00</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const balanceInput = document.getElementById('balance');
    const riskInput = document.getElementById('risk');
    const stoplossInput = document.getElementById('stoploss');
    
    function calculateTrade() {
        const balance = parseFloat(balanceInput.value) || 0;
        const riskPercent = parseFloat(riskInput.value) || 0;
        const slPoints = parseFloat(stoplossInput.value) || 1;
        
        const riskAmount = balance * (riskPercent / 100);
        document.getElementById('riskAmount').textContent = '$' + riskAmount.toFixed(2);
        
        const lotSize = riskAmount / slPoints;
        document.getElementById('lotSize').textContent = Math.max(lotSize, 0.001).toFixed(3);
        
        // Calculate Profit Targets
        document.getElementById('tp1').textContent = '$' + (riskAmount * 2).toFixed(2);
        document.getElementById('tp2').textContent = '$' + (riskAmount * 3).toFixed(2);
    }

    [balanceInput, riskInput, stoplossInput].forEach(el => el.addEventListener('input', calculateTrade));
</script>
</html>
